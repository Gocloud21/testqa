<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #18181d;
      --border: #2a2a33;
      --accent: #c8f560;
      --accent-dim: #a8d845;
      --text: #f0efe8;
      --muted: #7a7a88;
      --danger: #ff5e5e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 6rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .container {
      width: 100%;
      max-width: 580px;
    }

    .add-form {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: var(--accent); }
    .add-form input::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #0e0e11;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.4rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--accent-dim); }
    .btn:active { transform: scale(0.97); }

    .stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .stats span { display: flex; gap: 0.4rem; align-items: center; }
    .stats strong { color: var(--accent); font-size: 1.1rem; }

    .task-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item.completed { opacity: 0.55; }
    .task-item:hover { border-color: #3a3a45; }

    .task-check {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-item.completed .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check svg { display: none; }
    .task-item.completed .task-check svg { display: block; }

    .task-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.4;
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      opacity: 0;
      transition: color 0.15s, opacity 0.15s;
      display: flex;
    }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 0;
      font-size: 0.95rem;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0e0e11;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>Task<em>Flow</em></h1>
  <p class="subtitle">Simple task management</p>
</header>

<div class="container">
  <form class="add-form" id="addForm">
    <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" data-testid="task-input" />
    <button type="submit" class="btn" data-testid="add-btn">Add task</button>
  </form>

  <div class="stats" id="stats"></div>
  <div class="task-list" id="taskList" data-testid="task-list"></div>
</div>

<div id="toast"></div>

<script>
  const taskList = document.getElementById('taskList');
  const stats    = document.getElementById('stats');
  const form     = document.getElementById('addForm');
  const input    = document.getElementById('taskInput');
  const toast    = document.getElementById('toast');
  let tasks      = [];

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function renderStats() {
    const total = tasks.length;
    const done  = tasks.filter(t => t.completed).length;
    stats.innerHTML = `
      <span><strong>${total}</strong> total</span>
      <span><strong>${done}</strong> done</span>
      <span><strong>${total - done}</strong> remaining</span>`;
  }

  function renderTasks() {
    if (!tasks.length) {
      taskList.innerHTML = '<div class="empty">No tasks yet — add one above!</div>';
      renderStats(); return;
    }
    taskList.innerHTML = tasks.map(t => `
      <div class="task-item ${t.completed ? 'completed' : ''}" data-id="${t.id}" data-testid="task-item">
        <div class="task-check" onclick="toggle(${t.id})" data-testid="task-check-${t.id}">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="#0e0e11" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="task-title" data-testid="task-title-${t.id}">${escHtml(t.title)}</span>
        <button class="delete-btn" onclick="remove(${t.id})" data-testid="delete-btn-${t.id}" title="Delete">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>`).join('');
    renderStats();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function fetchTasks() {
    const r = await fetch('/api/tasks');
    tasks = await r.json();
    renderTasks();
  }

  async function toggle(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const r = await fetch(`/api/tasks/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: !task.completed }),
    });
    const updated = await r.json();
    tasks = tasks.map(t => t.id === id ? updated : t);
    renderTasks();
  }

  async function remove(id) {
    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    tasks = tasks.filter(t => t.id !== id);
    showToast('Task deleted');
    renderTasks();
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const title = input.value.trim();
    if (!title) return;
    const r = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title }),
    });
    const task = await r.json();
    tasks.push(task);
    input.value = '';
    showToast('Task added!');
    renderTasks();
  });

  fetchTasks();
</script>
</body>
</html>
